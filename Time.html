<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Horário Atual</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #clock {
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    
    #video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
  </style>
</head>
<body>
    <video id="video-background" autoplay muted loop>
        <source src="15810-266811416.mp4" type="video/mp4">
    </video>

  <div id="clock">00:00:00</div>

  <script>
    function atualizarRelogio() {
      const agora = new Date();

      let mes = (agora.getMonth() + 1).toString().padStart(2, '0');
      let anos = agora.getFullYear().toString();
      let dia = agora.getDate().toString().padStart(2, '0');

      let horas = agora.getHours().toString().padStart(2, '0');
      let minutos = agora.getMinutes().toString().padStart(2, '0');
      let segundos = agora.getSeconds().toString().padStart(2, '0');

      const horario = `${dia}/${mes}/${anos} ${horas}:${minutos}:${segundos}`;

      document.getElementById('clock').textContent = horario;
    }

    setInterval(atualizarRelogio, 1000);

    atualizarRelogio(); // chama na hora ao abrir
  </script>

</body>
</html>
